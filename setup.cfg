[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    .eggs,
    *.egg-info,
    dist,
    build,
    docs,
    data,
    checkpoints,
    logs
ignore =
    E203,
    W503,
    E501

[tool:pytest]
testpaths = tests
addopts = -v --tb=short
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    slow: marks tests as slow-running
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
