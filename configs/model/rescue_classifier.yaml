name: rescue_classifier

architecture:
  gnn_hidden_dim: 256
  gnn_n_layers: 6
  gnn_n_heads: 4
  hidden_dims: [512, 256, 128, 64]
  dropout: 0.2
  node_feat_dim: 30
  edge_feat_dim: 20
  esm2_embed_dim: 480
  thermo_feat_dim: 16
  evo_feat_dim: 32

training:
  lr: 3e-4
  weight_decay: 1e-4
  batch_size: 32
  n_epochs: 100
  grad_clip: 1.0
  grad_accumulation_steps: 4
  ema_decay: 0.9999
  focal_loss_gamma: 2.0
  focal_loss_alpha: 0.25
  scheduler: cosine_annealing
  T_max: 50000
  warmup_steps: 1000

evaluation:
  threshold: 0.5
  targets:
    auroc: 0.85
    auprc: 0.70
    mcc: 0.55
    f1: 0.65
