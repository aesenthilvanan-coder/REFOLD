name: pocket_detector

architecture:
  hidden_dim: 256
  n_layers: 6
  n_heads: 4
  node_feat_dim: 30
  edge_feat_dim: 20
  output_dim: 1

enm:
  cutoff_angstrom: 12.0
  n_modes: 20
  n_skip_trivial: 6
  amplitude_scale: 1.0
  n_conformations: 50

fpocket:
  min_alpha_sphere_radius: 3.0
  max_alpha_sphere_radius: 6.0
  min_druggability_score: 0.5
  overlap_threshold: 0.3
  transient_freq_threshold: 0.20
  wt_distance_threshold: 6.0

training:
  lr: 1e-4
  weight_decay: 1e-4
  batch_size: 16
  n_epochs: 50
  grad_clip: 1.0
  pos_weight: 5.0
