name: admet_predictor

architecture:
  input_dim: 2215
  hidden_dims: [512, 256, 128]
  n_tasks: 8
  dropout: 0.3
  fingerprint:
    morgan_radius: 2
    morgan_bits: 2048
    maccs_keys: 167

tasks:
  - herg_inhibition
  - bbb_permeability
  - cyp3a4_inhibition
  - oral_bioavailability
  - solubility
  - hia_absorption
  - pgp_substrate
  - ames_mutagenicity

thresholds:
  herg_inhibition: 0.5
  bbb_permeability: 0.5
  cyp3a4_inhibition: 0.5
  oral_bioavailability: 0.5
  ames_mutagenicity: 0.5

training:
  lr: 1e-4
  weight_decay: 1e-4
  batch_size: 256
  n_epochs: 100
  grad_clip: 1.0
  scheduler: cosine_annealing
  T_max: 50000
