project:
  name: REFOLD
  version: "1.0.0"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  results_dir: "data/results"
  alphafold_version: "v4"

pipeline:
  rescue_probability_threshold: 0.50
  high_confidence_threshold: 0.80
  ddg_destabilizing_threshold: 0.50
  ddg_severely_unstable: 5.00
  n_conformations: 50
  n_enm_modes: 20
  transient_pocket_freq_threshold: 0.20
  druggability_threshold: 0.50
  n_molecules_per_pocket: 1000
  n_diffusion_steps: 1000
  n_atoms_range: [10, 35]

models:
  rescue_classifier:
    esm2_dim: 480
    hidden_dims: [512, 256, 128, 64]
    dropout: 0.20
  pocket_detector:
    hidden_dim: 256
    n_layers: 6
    n_heads: 4
  molecule_generator:
    hidden_dim: 256
    n_layers: 6
    n_heads: 8
    pocket_embed_dim: 128
    T: 1000
  admet_predictor:
    hidden_dims: [512, 256, 128]

training:
  rescue_classifier:
    batch_size: 8
    gradient_accumulation: 4
    learning_rate: 3.0e-4
    weight_decay: 0.01
    pretrain_epochs: 10
    finetune_epochs: 50
    patience: 10
    ema_decay: 0.9999
  molecule_generator:
    batch_size: 4
    gradient_accumulation: 8
    learning_rate: 1.0e-4
    n_steps: 100000
    ema_decay: 0.9999

filters:
  max_mw: 500.0
  max_logp: 5.0
  max_hbd: 5
  max_hba: 10
  max_rotatable_bonds: 10
  max_tpsa: 140.0
  max_sa_score: 4.0
  min_qed: 0.30
  remove_pains: true

logging:
  level: "INFO"
  log_dir: "logs"
