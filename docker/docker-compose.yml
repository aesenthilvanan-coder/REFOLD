version: "3.9"

services:
  refold-cpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: refold:cpu
    volumes:
      - ../data:/refold/data
      - ../checkpoints:/refold/checkpoints
      - ../logs:/refold/logs
    environment:
      - REFOLD_DEVICE=cpu

  refold-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    image: refold:gpu
    volumes:
      - ../data:/refold/data
      - ../checkpoints:/refold/checkpoints
      - ../logs:/refold/logs
    environment:
      - REFOLD_DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
